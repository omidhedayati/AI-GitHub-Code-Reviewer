services:
  postgres:
    image: postgres:16-alpine
    container_name: reviewer-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-reviewer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-reviewer}
      POSTGRES_DB: ${POSTGRES_DB:-reviewer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reviewer} -d ${POSTGRES_DB:-reviewer}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reviewer-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-reviewer}:${POSTGRES_PASSWORD:-reviewer}@postgres:5432/${POSTGRES_DB:-reviewer}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: reviewer-frontend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    profiles:
      - ai
    image: ollama/ollama:latest
    container_name: reviewer-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
